<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>BANG - Database Setup & Configuration</title>
  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { 
      getFirestore, 
      collection, 
      doc, 
      setDoc, 
      getDocs, 
      deleteDoc,
      writeBatch,
      Timestamp 
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    import { getStorage, ref } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2g8see9kRvS4nfJ5Z1oAqgrucAzoLcQE",
      authDomain: "bang-6a629.firebaseapp.com",
      projectId: "bang-6a629",
      storageBucket: "bang-6a629.firebasestorage.app",
      messagingSenderId: "524058911761",
      appId: "1:524058911761:web:4600834154744a0958fdb0",
      measurementId: "G-2BCDVCKJTT"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    window.db = db;
    window.auth = auth;
    window.storage = storage;
    window.Timestamp = Timestamp;
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      min-height: 100vh;
      color: #f0f0f0;
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff3b3b, #ff9f2e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #aaa;
      font-size: 18px;
    }

    .config-card {
      background: rgba(18, 18, 18, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      border: 1px solid rgba(229, 9, 20, 0.3);
      overflow: hidden;
      margin-bottom: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .card-header {
      background: linear-gradient(135deg, #e50914, #ff6b6b);
      padding: 20px 24px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
    }

    .card-header:hover {
      background: linear-gradient(135deg, #ff1a2a, #ff8080);
    }

    .card-header h2 {
      font-size: 24px;
      margin: 0;
    }

    .card-header .status {
      font-size: 14px;
      background: rgba(0,0,0,0.5);
      padding: 4px 12px;
      border-radius: 20px;
    }

    .card-content {
      padding: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }

    .card-content.active {
      max-height: 800px;
      padding: 24px;
    }

    .collection-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .collection-item {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      border-left: 3px solid #e50914;
    }

    .collection-name {
      font-weight: 600;
      font-size: 18px;
      margin-bottom: 8px;
      color: #ff9f2e;
    }

    .collection-fields {
      font-size: 12px;
      color: #aaa;
      margin-top: 8px;
      font-family: monospace;
    }

    .field-tag {
      background: #2a2a2a;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      margin: 2px;
      font-size: 11px;
    }

    .setup-btn {
      background: linear-gradient(135deg, #e50914, #ff6b6b);
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin: 20px 0;
      width: 100%;
    }

    .setup-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(229, 9, 20, 0.3);
    }

    .setup-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      overflow: hidden;
      margin: 20px 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #e50914, #ff9f2e);
      width: 0%;
      transition: width 0.3s;
      border-radius: 2px;
    }

    .log-area {
      background: #0a0a0a;
      border-radius: 12px;
      padding: 16px;
      max-height: 400px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      margin-top: 20px;
      border: 1px solid #2a2a2a;
    }

    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid #1a1a1a;
      color: #8bc34a;
    }

    .log-error {
      color: #ff6b6b;
    }

    .log-success {
      color: #4caf50;
    }

    .log-info {
      color: #64b5f6;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
    }

    .badge-success {
      background: #4caf50;
      color: white;
    }

    .badge-pending {
      background: #ff9800;
      color: white;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin: 20px 0;
    }

    .stat-card {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 700;
      color: #ff9f2e;
    }

    .stat-label {
      font-size: 12px;
      color: #aaa;
      margin-top: 8px;
    }

    @media (max-width: 768px) {
      .collection-list {
        grid-template-columns: 1fr;
      }
      .logo {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">🔥 BANG Database Setup</div>
    <div class="subtitle">Automatic Collection & Index Configuration</div>
  </div>

  <div class="config-card">
    <div class="card-header" onclick="toggleCard(this)">
      <h2>📊 Database Schema Overview</h2>
      <span class="status">Click to expand</span>
    </div>
    <div class="card-content">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-number" id="collectionCount">0</div>
          <div class="stat-label">Collections</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="totalFields">0</div>
          <div class="stat-label">Total Fields</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="indexCount">0</div>
          <div class="stat-label">Indexes</div>
        </div>
      </div>
      <div id="collectionsList"></div>
    </div>
  </div>

  <button class="setup-btn" id="setupDatabaseBtn">
    🚀 Initialize Database & Collections
  </button>

  <div class="progress-bar" id="progressBar" style="display: none;">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="log-area" id="logArea">
    <div class="log-entry log-info">💡 Ready to initialize database structure...</div>
    <div class="log-entry log-info">📌 Click the button above to create all collections and indexes</div>
  </div>
</div>

<script type="module">
  import { 
    getFirestore, 
    collection, 
    doc, 
    setDoc, 
    getDocs, 
    deleteDoc,
    Timestamp 
  } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  
  // Database Schema Definition
  const DATABASE_SCHEMA = {
    collections: {
      'users': {
        description: 'User profiles and authentication data',
        fields: {
          uid: { type: 'string', required: true, indexed: true },
          email: { type: 'string', required: true, indexed: true },
          displayName: { type: 'string', required: true },
          photoURL: { type: 'string', default: null },
          createdAt: { type: 'timestamp', required: true },
          role: { type: 'string', default: 'user', enum: ['user', 'creator', 'admin'] },
          channelName: { type: 'string', default: null },
          channelDescription: { type: 'string', default: null },
          totalVideos: { type: 'number', default: 0 },
          totalViews: { type: 'number', default: 0 },
          totalSubscribers: { type: 'number', default: 0 },
          isVerified: { type: 'boolean', default: false },
          lastActive: { type: 'timestamp', required: true }
        },
        indexes: ['email', 'channelName', 'role']
      },
      
      'videos': {
        description: 'All video content metadata',
        fields: {
          videoId: { type: 'string', required: true, indexed: true },
          title: { type: 'string', required: true, indexed: true },
          description: { type: 'string', default: '' },
          videoURL: { type: 'string', required: true },
          thumbnailURL: { type: 'string', required: true },
          channelId: { type: 'string', required: true, indexed: true },
          channelName: { type: 'string', required: true, indexed: true },
          views: { type: 'number', default: 0, indexed: true },
          likes: { type: 'number', default: 0 },
          dislikes: { type: 'number', default: 0 },
          commentCount: { type: 'number', default: 0 },
          likedBy: { type: 'array', default: [] },
          dislikedBy: { type: 'array', default: [] },
          duration: { type: 'number', default: 0 },
          resolution: { type: 'string', default: '720p' },
          tags: { type: 'array', default: [] },
          category: { type: 'string', default: 'General' },
          isPublic: { type: 'boolean', default: true },
          isAgeRestricted: { type: 'boolean', default: false },
          createdAt: { type: 'timestamp', required: true, indexed: true },
          updatedAt: { type: 'timestamp', required: true }
        },
        indexes: ['channelId', 'views', 'createdAt', 'category', 'tags']
      },
      
      'comments': {
        description: 'User comments on videos',
        fields: {
          commentId: { type: 'string', required: true, indexed: true },
          videoId: { type: 'string', required: true, indexed: true },
          userId: { type: 'string', required: true, indexed: true },
          userName: { type: 'string', required: true },
          userPhotoURL: { type: 'string', default: null },
          text: { type: 'string', required: true },
          likes: { type: 'number', default: 0 },
          likedBy: { type: 'array', default: [] },
          replies: { type: 'number', default: 0 },
          isEdited: { type: 'boolean', default: false },
          createdAt: { type: 'timestamp', required: true, indexed: true },
          updatedAt: { type: 'timestamp', required: true }
        },
        indexes: ['videoId', 'userId', 'createdAt']
      },
      
      'playlists': {
        description: 'User created playlists',
        fields: {
          playlistId: { type: 'string', required: true, indexed: true },
          title: { type: 'string', required: true, indexed: true },
          description: { type: 'string', default: '' },
          userId: { type: 'string', required: true, indexed: true },
          videoIds: { type: 'array', default: [] },
          videoCount: { type: 'number', default: 0 },
          thumbnailURL: { type: 'string', default: null },
          isPublic: { type: 'boolean', default: true },
          views: { type: 'number', default: 0 },
          createdAt: { type: 'timestamp', required: true },
          updatedAt: { type: 'timestamp', required: true }
        },
        indexes: ['userId', 'title']
      },
      
      'subscriptions': {
        description: 'User subscriptions to channels',
        fields: {
          subscriptionId: { type: 'string', required: true, indexed: true },
          subscriberId: { type: 'string', required: true, indexed: true },
          channelId: { type: 'string', required: true, indexed: true },
          channelName: { type: 'string', required: true },
          createdAt: { type: 'timestamp', required: true }
        },
        indexes: ['subscriberId', 'channelId']
      },
      
      'watchHistory': {
        description: 'User video watch history',
        fields: {
          historyId: { type: 'string', required: true, indexed: true },
          userId: { type: 'string', required: true, indexed: true },
          videoId: { type: 'string', required: true, indexed: true },
          videoTitle: { type: 'string', required: true },
          thumbnailURL: { type: 'string', required: true },
          watchedAt: { type: 'timestamp', required: true, indexed: true },
          watchDuration: { type: 'number', default: 0 },
          completed: { type: 'boolean', default: false }
        },
        indexes: ['userId', 'videoId', 'watchedAt']
      },
      
      'likedVideos': {
        description: 'User liked videos (normalized collection)',
        fields: {
          likeId: { type: 'string', required: true, indexed: true },
          userId: { type: 'string', required: true, indexed: true },
          videoId: { type: 'string', required: true, indexed: true },
          videoTitle: { type: 'string', required: true },
          thumbnailURL: { type: 'string', required: true },
          likedAt: { type: 'timestamp', required: true }
        },
        indexes: ['userId', 'videoId']
      },
      
      'reports': {
        description: 'User reports for videos/comments',
        fields: {
          reportId: { type: 'string', required: true, indexed: true },
          reporterId: { type: 'string', required: true, indexed: true },
          targetType: { type: 'string', required: true, enum: ['video', 'comment'] },
          targetId: { type: 'string', required: true, indexed: true },
          reason: { type: 'string', required: true },
          description: { type: 'string', default: '' },
          status: { type: 'string', default: 'pending', enum: ['pending', 'reviewed', 'resolved'] },
          createdAt: { type: 'timestamp', required: true }
        },
        indexes: ['targetId', 'status', 'reporterId']
      },
      
      'analytics': {
        description: 'Platform analytics and metrics',
        fields: {
          date: { type: 'string', required: true, indexed: true },
          totalViews: { type: 'number', default: 0 },
          totalVideos: { type: 'number', default: 0 },
          totalUsers: { type: 'number', default: 0 },
          totalComments: { type: 'number', default: 0 },
          activeUsers: { type: 'number', default: 0 },
          newUsers: { type: 'number', default: 0 },
          newVideos: { type: 'number', default: 0 }
        },
        indexes: ['date']
      }
    }
  };

  let setupInProgress = false;
  const db = window.db;

  // Helper functions
  function addLog(message, type = 'info') {
    const logArea = document.getElementById('logArea');
    const logEntry = document.createElement('div');
    logEntry.className = `log-entry log-${type}`;
    const timestamp = new Date().toLocaleTimeString();
    logEntry.textContent = `[${timestamp}] ${message}`;
    logArea.appendChild(logEntry);
    logArea.scrollTop = logArea.scrollHeight;
    console.log(message);
  }

  function updateProgress(percent) {
    const progressFill = document.getElementById('progressFill');
    if (progressFill) {
      progressFill.style.width = `${percent}%`;
    }
  }

  async function createCollectionIfNotExists(collectionName) {
    try {
      // Try to get a reference to check if collection exists
      const collectionRef = collection(db, collectionName);
      const snapshot = await getDocs(collectionRef);
      
      if (snapshot.empty) {
        // Create a placeholder document to initialize the collection
        const placeholderRef = doc(collectionRef, '_init_placeholder_');
        await setDoc(placeholderRef, {
          _metadata: {
            initializedAt: Timestamp.now(),
            description: DATABASE_SCHEMA.collections[collectionName]?.description || '',
            version: '1.0'
          }
        });
        addLog(`✅ Created collection: ${collectionName}`, 'success');
        
        // Remove placeholder after 500ms
        setTimeout(async () => {
          try {
            await deleteDoc(placeholderRef);
          } catch (e) {
            // Ignore if placeholder already deleted
          }
        }, 500);
        
        return true;
      } else {
        addLog(`ℹ️ Collection already exists: ${collectionName} (${snapshot.size} documents)`, 'info');
        return true;
      }
    } catch (error) {
      addLog(`❌ Error creating collection ${collectionName}: ${error.message}`, 'error');
      return false;
    }
  }

  async function createMetadataDocument() {
    try {
      const metadataRef = doc(db, '_database_metadata', 'schema_v1');
      await setDoc(metadataRef, {
        initializedAt: Timestamp.now(),
        schema: DATABASE_SCHEMA,
        version: '1.0.0',
        collectionsCount: Object.keys(DATABASE_SCHEMA.collections).length
      });
      addLog(`📇 Created database metadata document`, 'success');
      return true;
    } catch (error) {
      addLog(`⚠️ Could not create metadata: ${error.message}`, 'error');
      return false;
    }
  }

  async function createSampleUser() {
    try {
      const sampleUserRef = doc(db, 'users', '_sample_user');
      await setDoc(sampleUserRef, {
        _isSample: true,
        uid: 'sample_uid',
        email: 'sample@bang.com',
        displayName: 'Sample User',
        channelName: 'Sample Channel',
        createdAt: Timestamp.now(),
        lastActive: Timestamp.now(),
        role: 'user',
        totalVideos: 0,
        totalViews: 0,
        totalSubscribers: 0,
        isVerified: false
      });
      
      setTimeout(async () => {
        try {
          await deleteDoc(sampleUserRef);
        } catch (e) {}
      }, 2000);
      
      addLog(`📝 Created sample user data (auto-cleaning)`, 'success');
    } catch (error) {
      addLog(`ℹ️ Sample user creation skipped: ${error.message}`, 'info');
    }
  }

  async function setupDatabase() {
    if (setupInProgress) {
      addLog('⚠️ Setup already in progress...', 'error');
      return;
    }
    
    setupInProgress = true;
    const setupBtn = document.getElementById('setupDatabaseBtn');
    const progressBar = document.getElementById('progressBar');
    
    setupBtn.disabled = true;
    setupBtn.textContent = '🚀 Initializing Database...';
    progressBar.style.display = 'block';
    
    const collections = Object.keys(DATABASE_SCHEMA.collections);
    let completed = 0;
    
    addLog('🔥 Starting BANG Database Setup...', 'info');
    addLog(`📦 Found ${collections.length} collections to initialize`, 'info');
    
    for (let i = 0; i < collections.length; i++) {
      const collectionName = collections[i];
      const schema = DATABASE_SCHEMA.collections[collectionName];
      addLog(`🔄 Creating collection: ${collectionName} (${schema.description})`, 'info');
      
      await createCollectionIfNotExists(collectionName);
      
      completed = i + 1;
      const percent = (completed / collections.length) * 100;
      updateProgress(percent);
      
      // Small delay to avoid rate limiting
      await new Promise(resolve => setTimeout(resolve, 100));
    }
    
    await createMetadataDocument();
    await createSampleUser();
    
    updateProgress(100);
    addLog('✨ Database setup complete! All collections are ready.', 'success');
    addLog('📊 You can now start using the BANG platform.', 'success');
    
    setTimeout(() => {
      progressBar.style.display = 'none';
      setupBtn.disabled = false;
      setupBtn.textContent = '✅ Database Ready - Re-run Setup';
      setupInProgress = false;
      
      // Update stats
      updateStats();
    }, 1000);
  }
  
  function updateStats() {
    const collections = Object.keys(DATABASE_SCHEMA.collections);
    document.getElementById('collectionCount').textContent = collections.length;
    
    let totalFields = 0;
    let totalIndexes = 0;
    Object.values(DATABASE_SCHEMA.collections).forEach(schema => {
      totalFields += Object.keys(schema.fields).length;
      totalIndexes += (schema.indexes || []).length;
    });
    document.getElementById('totalFields').textContent = totalFields;
    document.getElementById('indexCount').textContent = totalIndexes;
  }
  
  function displaySchema() {
    const collectionsList = document.getElementById('collectionsList');
    const collections = DATABASE_SCHEMA.collections;
    
    let html = '<div class="collection-list">';
    for (const [name, schema] of Object.entries(collections)) {
      const fields = Object.keys(schema.fields);
      html += `
        <div class="collection-item">
          <div class="collection-name">📁 ${name}</div>
          <div class="collection-fields">
            <strong>Fields:</strong> ${fields.length}
            <div style="margin-top: 8px;">
              ${fields.slice(0, 5).map(f => `<span class="field-tag">${f}</span>`).join('')}
              ${fields.length > 5 ? `<span class="field-tag">+${fields.length - 5} more</span>` : ''}
            </div>
          </div>
          <div class="collection-fields" style="margin-top: 8px;">
            <strong>Indexes:</strong> ${schema.indexes?.length || 0}
          </div>
        </div>
      `;
    }
    html += '</div>';
    collectionsList.innerHTML = html;
    updateStats();
  }
  
  // Make toggleCard globally available
  window.toggleCard = function(header) {
    const content = header.nextElementSibling;
    content.classList.toggle('active');
    const status = header.querySelector('.status');
    if (content.classList.contains('active')) {
      status.textContent = 'Click to collapse';
    } else {
      status.textContent = 'Click to expand';
    }
  };
  
  // Initialize
  displaySchema();
  
  // Setup button click handler
  document.getElementById('setupDatabaseBtn').addEventListener('click', setupDatabase);
  
  // Auto-check existing collections on load
  async function checkExistingCollections() {
    addLog('🔍 Checking existing database collections...', 'info');
    const collections = Object.keys(DATABASE_SCHEMA.collections);
    let existingCount = 0;
    
    for (const collectionName of collections) {
      try {
        const snapshot = await getDocs(collection(db, collectionName));
        if (snapshot.size > 0) {
          existingCount++;
          addLog(`✓ Found existing collection: ${collectionName} (${snapshot.size} docs)`, 'success');
        } else {
          addLog(`○ Empty collection: ${collectionName} (ready for initialization)`, 'info');
        }
      } catch (error) {
        addLog(`? Collection not yet created: ${collectionName}`, 'info');
      }
    }
    
    if (existingCount === collections.length) {
      addLog(`✅ All ${existingCount} collections already exist with data!`, 'success');
    } else if (existingCount > 0) {
      addLog(`📝 ${existingCount}/${collections.length} collections have data. Run setup to initialize empty ones.`, 'info');
    } else {
      addLog(`📝 0/${collections.length} collections exist. Click the button to initialize all.`, 'info');
    }
  }
  
  // Check on load
  setTimeout(() => {
    checkExistingCollections().catch(console.error);
  }, 1000);
</script>
</body>
</html>
