<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>BANG - Database Setup & Configuration</title>
  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, getDoc, updateDoc, deleteDoc, where, arrayUnion, arrayRemove, increment, Timestamp, writeBatch, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2g8see9kRvS4nfJ5Z1oAqgrucAzoLcQE",
      authDomain: "bang-6a629.firebaseapp.com",
      projectId: "bang-6a629",
      storageBucket: "bang-6a629.firebasestorage.app",
      messagingSenderId: "524058911761",
      appId: "1:524058911761:web:4600834154744a0958fdb0",
      measurementId: "G-2BCDVCKJTT"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    window.auth = auth;
    window.db = db;
    window.storage = storage;
    window.Timestamp = Timestamp;
    window.increment = increment;
    window.arrayUnion = arrayUnion;
    window.arrayRemove = arrayRemove;
    window.writeBatch = writeBatch;
    window.setDoc = setDoc;
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .header {
      background: #111;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
      background: rgba(17, 17, 17, 0.95);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 12px 0;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff3b3b, #ff9f2e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 40px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: #2c2c2c;
      color: white;
    }

    .btn-primary {
      background: #e50914;
      color: white;
    }

    .btn-primary:hover {
      background: #ff0f1a;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #555;
    }

    .btn-outline:hover {
      background: #2a2a2a;
    }

    .btn-success {
      background: #2e7d32;
      color: white;
    }

    .btn-success:hover {
      background: #1b5e20;
    }

    /* Config Panel */
    .config-panel {
      background: #121212;
      border-radius: 24px;
      margin: 30px 0;
      padding: 30px;
      border: 1px solid #2a2a2a;
    }

    .config-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .config-title {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #ff6b6b, #ffb347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .status-badge {
      padding: 8px 16px;
      border-radius: 40px;
      background: #1e1e1e;
      font-size: 14px;
    }

    .status-badge.success {
      background: #1b5e20;
      color: #81c784;
    }

    .status-badge.warning {
      background: #b71c1c;
      color: #ff8a80;
    }

    .collection-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }

    .collection-card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 20px;
      border-left: 4px solid #e50914;
      transition: transform 0.2s;
    }

    .collection-card:hover {
      transform: translateY(-2px);
      background: #202020;
    }

    .collection-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #ff6b6b;
    }

    .collection-desc {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .schema-item {
      font-family: monospace;
      font-size: 12px;
      background: #0a0a0a;
      padding: 8px;
      border-radius: 8px;
      margin-top: 12px;
      color: #8bc34a;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      background: #2c2c2c;
      border-radius: 6px;
      font-size: 11px;
      margin-right: 6px;
      margin-top: 8px;
    }

    .progress-bar {
      height: 4px;
      background: #2c2c2c;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 16px;
    }

    .progress-fill {
      height: 100%;
      background: #e50914;
      width: 0%;
      transition: width 0.3s;
    }

    .log-area {
      background: #0a0a0a;
      border-radius: 12px;
      padding: 16px;
      margin-top: 24px;
      font-family: monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #2a2a2a;
    }

    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid #1a1a1a;
      color: #8bc34a;
    }

    .log-entry.error {
      color: #ff6b6b;
    }

    .log-entry.success {
      color: #81c784;
    }

    /* videos grid */
    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin: 30px 0;
    }

    .video-card {
      background: #121212;
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.2s;
      cursor: pointer;
      border: 1px solid #222;
    }

    .video-card:hover {
      transform: translateY(-5px);
      border-color: #e50914;
    }

    .thumbnail {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #1a1a1a;
    }

    .video-info {
      padding: 12px;
    }

    .video-title {
      font-weight: 600;
      font-size: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .video-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #aaa;
      margin-top: 8px;
    }

    .channel-name {
      color: #ddd;
      font-weight: 500;
      font-size: 0.8rem;
    }

    /* modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: #111;
      max-width: 900px;
      width: 90%;
      border-radius: 24px;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid #333;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #222;
    }

    .close-modal {
      font-size: 28px;
      cursor: pointer;
    }

    .upload-form, .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 24px;
    }

    input, textarea, select {
      background: #1e1e1e;
      border: 1px solid #333;
      padding: 12px;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
    }

    .video-actions {
      display: flex;
      gap: 24px;
      padding: 16px 20px;
      border-bottom: 1px solid #222;
    }

    .action-btn {
      background: none;
      border: none;
      color: #ccc;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 1rem;
    }

    .action-btn.active {
      color: #e50914;
    }

    .comments-section {
      padding: 20px;
    }

    .comment {
      padding: 12px 0;
      border-bottom: 1px solid #222;
    }

    .dashboard {
      background: #0f0f0f;
      border-radius: 24px;
      margin: 20px 0;
      padding: 20px;
    }

    .responsive-table {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #222;
    }

    .delete-vid {
      color: #ff5c5c;
      cursor: pointer;
      background: none;
      border: none;
    }

    @media (max-width: 640px) {
      .header-inner {
        flex-direction: column;
        gap: 12px;
      }
      .videos-grid {
        grid-template-columns: 1fr;
      }
      .collection-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="container header-inner">
    <div class="logo">🔥 BANG</div>
    <div class="nav-buttons" id="nav-buttons">
      <button class="btn" id="homeBtn">🏠 Home</button>
      <button class="btn btn-primary" id="uploadBtn" style="display: none;">📤 Upload</button>
      <button class="btn btn-outline" id="dashboardBtn" style="display: none;">📊 Dashboard</button>
      <button class="btn btn-outline" id="configBtn">⚙️ Config DB</button>
      <span id="userGreet"></span>
      <button class="btn" id="authBtn">Sign In</button>
    </div>
  </div>
</div>

<main class="container" id="appContent">
  <!-- Configuration Panel (shown by default) -->
  <div id="configPanel" class="config-panel">
    <div class="config-header">
      <div>
        <div class="config-title">Database Configuration</div>
        <div style="font-size: 14px; color: #aaa; margin-top: 8px;">Firestore Collections & Indexes Setup</div>
      </div>
      <div>
        <span class="status-badge" id="dbStatus">⚠️ Not Configured</span>
        <button class="btn btn-success" id="setupDatabaseBtn" style="margin-left: 12px;">🚀 Auto-Setup Database</button>
      </div>
    </div>
    
    <div class="collection-grid" id="collectionGrid">
      <!-- Collections will be rendered here -->
    </div>
    
    <div class="log-area" id="logArea">
      <div class="log-entry">✨ Ready to setup database. Click "Auto-Setup Database" to create all collections and sample data.</div>
    </div>
  </div>

  <!-- Videos Grid (hidden initially) -->
  <div id="videosGrid" class="videos-grid" style="display: none;"></div>
  <div id="dashboardPanel" style="display: none;"></div>
</main>

<!-- Auth Modal -->
<div id="authModal" class="modal">
  <div class="modal-content" style="max-width: 420px;">
    <div class="modal-header">
      <h3>Join BANG</h3>
      <span class="close-modal" id="closeAuthModal">&times;</span>
    </div>
    <div class="upload-form">
      <input type="email" id="authEmail" placeholder="Email">
      <input type="password" id="authPassword" placeholder="Password">
      <button class="btn btn-primary" id="signInBtn">Sign In</button>
      <button class="btn btn-outline" id="signUpBtn">Create Account</button>
    </div>
  </div>
</div>

<!-- Upload Modal -->
<div id="uploadModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Upload Video</h3>
      <span class="close-modal" id="closeUploadModal">&times;</span>
    </div>
    <div class="upload-form">
      <input type="text" id="videoTitle" placeholder="Video title">
      <textarea id="videoDesc" rows="3" placeholder="Description"></textarea>
      <input type="file" id="videoFile" accept="video/*">
      <input type="file" id="thumbFile" accept="image/*">
      <button class="btn btn-primary" id="publishVideoBtn">Publish</button>
      <div id="uploadProgress"></div>
    </div>
  </div>
</div>

<!-- Video Modal -->
<div id="videoModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalVideoTitle"></h3>
      <span class="close-modal" id="closeVideoModal">&times;</span>
    </div>
    <div id="videoDetailContainer"></div>
  </div>
</div>

<script type="module">
  // ==================== DATABASE CONFIGURATION ====================
  const COLLECTIONS = [
    {
      name: "users",
      description: "User profiles, preferences, and account data",
      schema: {
        email: "string",
        displayName: "string",
        createdAt: "timestamp",
        avatarURL: "string",
        subscriberCount: "number",
        channelBanner: "string",
        isCreator: "boolean"
      },
      indexes: ["email", "displayName", "createdAt"]
    },
    {
      name: "videos",
      description: "All uploaded videos with metadata, views, likes",
      schema: {
        title: "string",
        description: "string",
        videoURL: "string",
        thumbnailURL: "string",
        channelId: "string (user uid)",
        channelName: "string",
        views: "number",
        likes: "number",
        commentCount: "number",
        likedBy: "array (user ids)",
        createdAt: "timestamp",
        duration: "number",
        tags: "array"
      },
      indexes: ["channelId", "createdAt", "views", "likes"]
    },
    {
      name: "comments",
      description: "Comments on videos (subcollection under videos)",
      schema: {
        text: "string",
        userId: "string",
        userName: "string",
        userAvatar: "string",
        createdAt: "timestamp",
        likes: "number"
      },
      isSubCollection: true,
      parentCollection: "videos"
    },
    {
      name: "channels",
      description: "Creator/Brand channel information",
      schema: {
        userId: "string",
        channelName: "string",
        channelHandle: "string",
        description: "string",
        bannerURL: "string",
        logoURL: "string",
        subscribers: "number",
        totalViews: "number",
        verified: "boolean",
        createdAt: "timestamp"
      },
      indexes: ["userId", "channelHandle", "subscribers"]
    },
    {
      name: "likes",
      description: "User like records for analytics",
      schema: {
        userId: "string",
        videoId: "string",
        createdAt: "timestamp"
      },
      indexes: ["userId", "videoId"]
    },
    {
      name: "watchHistory",
      description: "User watch history for recommendations",
      schema: {
        userId: "string",
        videoId: "string",
        watchedAt: "timestamp",
        progress: "number"
      },
      indexes: ["userId", "watchedAt"]
    },
    {
      name: "playlists",
      description: "User created playlists",
      schema: {
        userId: "string",
        name: "string",
        description: "string",
        videoIds: "array",
        visibility: "string (public/private)",
        createdAt: "timestamp"
      },
      indexes: ["userId", "visibility"]
    }
  ];

  let currentUser = null;
  let allVideos = [];

  // Helper: Add log message
  function addLog(message, type = 'info') {
    const logArea = document.getElementById('logArea');
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
    logArea.appendChild(entry);
    entry.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }

  // Auto-create collections and sample data
  async function setupDatabase() {
    addLog("🚀 Starting database setup...", "info");
    const setupBtn = document.getElementById('setupDatabaseBtn');
    setupBtn.disabled = true;
    setupBtn.textContent = "⏳ Setting up...";
    
    try {
      // Create collections by adding a temporary document and deleting it
      for (const collection of COLLECTIONS) {
        if (!collection.isSubCollection) {
          const testRef = doc(collection(db), collection.name, "_temp_check");
          try {
            await setDoc(testRef, { _setup: true, createdAt: Timestamp.now() });
            await deleteDoc(testRef);
            addLog(`✅ Collection "${collection.name}" created/verified`, "success");
          } catch (e) {
            addLog(`⚠️ Collection "${collection.name}" may already exist: ${e.message}`, "warning");
          }
        } else {
          addLog(`📁 Subcollection "${collection.name}" (under ${collection.parentCollection}) ready`, "success");
        }
      }
      
      // Create sample video if none exist
      const videosSnapshot = await getDocs(collection(db, "videos"));
      if (videosSnapshot.empty) {
        addLog("📹 Creating sample video for demonstration...", "info");
        const sampleVideo = {
          title: "Welcome to BANG! 🔥",
          description: "This is a sample video. Upload your own content and start sharing!",
          videoURL: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
          thumbnailURL: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/ForBiggerBlazes.jpg",
          channelId: "system",
          channelName: "BANG Official",
          views: 1247,
          likes: 342,
          commentCount: 18,
          likedBy: [],
          createdAt: Timestamp.now(),
          tags: ["welcome", "tutorial", "bang"]
        };
        await addDoc(collection(db, "videos"), sampleVideo);
        addLog("✅ Sample video created successfully", "success");
      }
      
      // Create sample channel info
      const channelsSnapshot = await getDocs(collection(db, "channels"));
      if (channelsSnapshot.empty) {
        addLog("📢 Creating sample channel...", "info");
        await addDoc(collection(db, "channels"), {
          userId: "system",
          channelName: "BANG Official",
          channelHandle: "@bang",
          description: "Official BANG platform channel",
          subscribers: 5280,
          totalViews: 15000,
          verified: true,
          createdAt: Timestamp.now()
        });
        addLog("✅ Sample channel created", "success");
      }
      
      // Update status badge
      const statusBadge = document.getElementById('dbStatus');
      statusBadge.textContent = "✅ Fully Configured";
      statusBadge.className = "status-badge success";
      
      addLog("🎉 Database setup complete! All collections are ready.", "success");
      renderCollections();
      
    } catch (error) {
      addLog(`❌ Setup error: ${error.message}`, "error");
    } finally {
      setupBtn.disabled = false;
      setupBtn.textContent = "🚀 Auto-Setup Database";
    }
  }
  
  // Render collections in grid
  function renderCollections() {
    const grid = document.getElementById('collectionGrid');
    grid.innerHTML = COLLECTIONS.map(col => `
      <div class="collection-card">
        <div class="collection-name">📁 ${col.name}</div>
        <div class="collection-desc">${col.description}</div>
        <div class="schema-item">
          <strong>Schema:</strong><br>
          ${Object.entries(col.schema).map(([key, type]) => `<span class="badge">${key}: ${type}</span>`).join('')}
        </div>
        ${col.indexes ? `<div><strong>Indexes:</strong> ${col.indexes.join(', ')}</div>` : ''}
        ${col.isSubCollection ? `<div style="margin-top:8px;color:#ffb347;">🔗 Subcollection of: ${col.parentCollection}</div>` : ''}
      </div>
    `).join('');
  }
  
  // ==================== VIDEO PLATFORM CODE ====================
  async function loadVideos() {
    try {
      const q = query(collection(db, "videos"), orderBy("createdAt", "desc"));
      const snapshot = await getDocs(q);
      allVideos = [];
      snapshot.forEach(docSnap => allVideos.push({ id: docSnap.id, ...docSnap.data() }));
      renderHomePage();
    } catch (err) {
      console.error(err);
    }
  }
  
  function renderHomePage() {
    const videosGrid = document.getElementById('videosGrid');
    const configPanel = document.getElementById('configPanel');
    configPanel.style.display = 'none';
    videosGrid.style.display = 'grid';
    
    if (!allVideos.length) {
      videosGrid.innerHTML = '<div style="text-align:center; margin:40px;">No videos yet. Upload your first video! 🔥</div>';
      return;
    }
    videosGrid.innerHTML = allVideos.map(video => `
      <div class="video-card" data-id="${video.id}">
        <img class="thumbnail" src="${video.thumbnailURL || 'https://placehold.co/480x270/222/fff?text=No+Thumb'}" alt="thumb">
        <div class="video-info">
          <div class="video-title">${escapeHtml(video.title)}</div>
          <div class="channel-name">${escapeHtml(video.channelName || 'Creator')}</div>
          <div class="video-meta">
            <span>👁️ ${formatNumber(video.views || 0)}</span>
            <span>❤️ ${formatNumber(video.likes || 0)}</span>
            <span>💬 ${formatNumber(video.commentCount || 0)}</span>
          </div>
        </div>
      </div>
    `).join('');
    
    document.querySelectorAll('.video-card').forEach(card => {
      card.addEventListener('click', () => openVideoDetail(card.dataset.id));
    });
  }
  
  async function openVideoDetail(videoId) {
    const video = allVideos.find(v => v.id === videoId);
    if (!video) return;
    const videoRef = doc(db, "videos", videoId);
    await updateDoc(videoRef, { views: increment(1) });
    video.views = (video.views || 0) + 1;
    
    const commentsSnap = await getDocs(query(collection(db, "videos", videoId, "comments"), orderBy("createdAt", "desc")));
    let commentsList = [];
    commentsSnap.forEach(docSnap => commentsList.push({ id: docSnap.id, ...docSnap.data() }));
    
    const isLiked = currentUser && video.likedBy?.includes(currentUser.uid);
    const container = document.getElementById('videoDetailContainer');
    document.getElementById('modalVideoTitle').innerText = video.title;
    
    container.innerHTML = `
      <video controls src="${video.videoURL}" poster="${video.thumbnailURL}" style="width:100%; max-height:60vh; background:#000;"></video>
      <div class="video-actions">
        <button class="action-btn like-btn ${isLiked ? 'active' : ''}" data-id="${videoId}">❤️ ${formatNumber(video.likes || 0)}</button>
      </div>
      <div class="comments-section">
        <textarea id="newComment" rows="2" placeholder="Add a comment..." style="width:100%; padding:12px; background:#1e1e1e; border:1px solid #333; border-radius:12px; color:white;"></textarea>
        <button class="btn btn-primary" id="postCommentBtn" style="margin-top:8px;">Post Comment</button>
        <div id="commentsList" style="margin-top:20px;">
          ${commentsList.map(c => `<div class="comment"><strong>${escapeHtml(c.userName)}</strong><p>${escapeHtml(c.text)}</p><small style="color:#888;">${new Date(c.createdAt?.toDate()).toLocaleString()}</small></div>`).join('') || '<p>No comments yet.</p>'}
        </div>
      </div>
    `;
    
    document.getElementById('videoModal').style.display = 'flex';
    
    const likeBtn = container.querySelector('.like-btn');
    likeBtn.addEventListener('click', async () => {
      if (!currentUser) { alert('Sign in to like'); return; }
      const vidRef = doc(db, "videos", videoId);
      const vidSnap = await getDoc(vidRef);
      const data = vidSnap.data();
      if (data.likedBy?.includes(currentUser.uid)) {
        await updateDoc(vidRef, { likes: increment(-1), likedBy: arrayRemove(currentUser.uid) });
        likeBtn.classList.remove('active');
        likeBtn.innerHTML = `❤️ ${formatNumber((data.likes || 1) - 1)}`;
      } else {
        await updateDoc(vidRef, { likes: increment(1), likedBy: arrayUnion(currentUser.uid) });
        likeBtn.classList.add('active');
        likeBtn.innerHTML = `❤️ ${formatNumber((data.likes || 0) + 1)}`;
      }
      loadVideos();
    });
    
    const postBtn = container.querySelector('#postCommentBtn');
    postBtn.addEventListener('click', async () => {
      if (!currentUser) { alert('Login to comment'); return; }
      const commentText = container.querySelector('#newComment').value.trim();
      if (!commentText) return;
      await addDoc(collection(db, "videos", videoId, "comments"), {
        text: commentText,
        userId: currentUser.uid,
        userName: currentUser.displayName || currentUser.email.split('@')[0],
        createdAt: Timestamp.now()
      });
      await updateDoc(vidRef, { commentCount: increment(1) });
      openVideoDetail(videoId);
    });
  }
  
  async function uploadVideo(file, thumbFile, title, desc) {
    if (!currentUser) throw new Error("Not logged in");
    const storagePath = `videos/${currentUser.uid}/${Date.now()}_${file.name}`;
    const storageRef = ref(storage, storagePath);
    const uploadTask = uploadBytesResumable(storageRef, file);
    return new Promise((resolve, reject) => {
      uploadTask.on('state_changed', (snap) => {
        const percent = (snap.bytesTransferred / snap.totalBytes) * 100;
        document.getElementById('uploadProgress').innerHTML = `Uploading: ${Math.round(percent)}%`;
      }, reject, async () => {
        const videoURL = await getDownloadURL(uploadTask.snapshot.ref);
        let thumbURL = null;
        if (thumbFile) {
          const thumbRef = ref(storage, `thumbnails/${currentUser.uid}/${Date.now()}_thumb`);
          const thumbTask = uploadBytesResumable(thumbRef, thumbFile);
          thumbTask.on('state_changed', null, reject, async () => {
            thumbURL = await getDownloadURL(thumbRef);
            await addDoc(collection(db, "videos"), {
              title, description: desc, videoURL, thumbnailURL: thumbURL,
              channelId: currentUser.uid, channelName: currentUser.displayName || currentUser.email.split('@')[0],
              views: 0, likes: 0, commentCount: 0, likedBy: [], createdAt: Timestamp.now()
            });
            resolve();
          });
        } else {
          await addDoc(collection(db, "videos"), {
            title, description: desc, videoURL, thumbnailURL: 'https://placehold.co/480x270/222/fff?text=Video',
            channelId: currentUser.uid, channelName: currentUser.displayName || currentUser.email.split('@')[0],
            views: 0, likes: 0, commentCount: 0, likedBy: [], createdAt: Timestamp.now()
          });
          resolve();
        }
      });
    });
  }
  
  async function showDashboard() {
    if (!currentUser) return;
    document.getElementById('configPanel').style.display = 'none';
    document.getElementById('videosGrid').style.display = 'none';
    const dashboardPanel = document.getElementById('dashboardPanel');
    dashboardPanel.style.display = 'block';
    const q = query(collection(db, "videos"), where("channelId", "==", currentUser.uid), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    const userVideos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    dashboardPanel.innerHTML = `
      <div class="dashboard">
        <h2>🎬 Creator Dashboard: ${currentUser.displayName || currentUser.email}</h2>
        <p>Total Videos: ${userVideos.length} | Total Views: ${userVideos.reduce((a,v)=>a+(v.views||0),0)}</p>
        <div class="responsive-table">
          <table>
            <thead><tr><th>Title</th><th>Views</th><th>Likes</th><th>Comments</th><th>Action</th></tr></thead>
            <tbody>
              ${userVideos.map(v => `<tr><td>${escapeHtml(v.title)}</td><td>${formatNumber(v.views)}</td><td>${formatNumber(v.likes)}</td><td>${formatNumber(v.commentCount)}</td><td><button class="delete-vid" data-id="${v.id}">Delete</button></td></tr>`).join('')}
            </tbody>
          </table>
        </div>
        <button class="btn btn-primary" id="dashUploadBtn">+ Upload New</button>
      </div>
    `;
    document.querySelectorAll('.delete-vid').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        if (confirm("Delete video?")) {
          await deleteDoc(doc(db, "videos", btn.dataset.id));
          showDashboard();
          loadVideos();
        }
      });
    });
    document.getElementById('dashUploadBtn')?.addEventListener('click', () => document.getElementById('uploadModal').style.display = 'flex');
  }
  
  function updateUIForUser(user) {
    currentUser = user;
    const authBtn = document.getElementById('authBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const dashboardBtn = document.getElementById('dashboardBtn');
    const userGreet = document.getElementById('userGreet');
    if (user) {
      authBtn.innerText = 'Sign Out';
      userGreet.innerText = `👋 ${user.displayName || user.email.split('@')[0]}`;
      uploadBtn.style.display = 'inline-block';
      dashboardBtn.style.display = 'inline-block';
    } else {
      authBtn.innerText = 'Sign In';
      userGreet.innerText = '';
      uploadBtn.style.display = 'none';
      dashboardBtn.style.display = 'none';
    }
  }
  
  // Helper functions
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
  function formatNumber(num) { if(num>=1e6) return (num/1e6).toFixed(1)+'M'; if(num>=1e3) return (num/1e3).toFixed(1)+'K'; return num; }
  
  // Event listeners
  onAuthStateChanged(auth, (user) => { updateUIForUser(user); loadVideos(); });
  document.getElementById('setupDatabaseBtn').onclick = setupDatabase;
  document.getElementById('configBtn').onclick = () => {
    document.getElementById('configPanel').style.display = 'block';
    document.getElementById('videosGrid').style.display = 'none';
    document.getElementById('dashboardPanel').style.display = 'none';
    renderCollections();
  };
  document.getElementById('homeBtn').onclick = () => {
    document.getElementById('configPanel').style.display = 'none';
    document.getElementById('dashboardPanel').style.display = 'none';
    loadVideos();
  };
  document.getElementById('uploadBtn').onclick = () => { if(currentUser) document.getElementById('uploadModal').style.display = 'flex'; else alert('Sign in first'); };
  document.getElementById('dashboardBtn').onclick = () => { if(currentUser) showDashboard(); else alert('Sign in'); };
  document.getElementById('authBtn').onclick = () => document.getElementById('authModal').style.display = 'flex';
  document.getElementById('closeAuthModal').onclick = () => document.getElementById('authModal').style.display = 'none';
  document.getElementById('closeUploadModal').onclick = () => document.getElementById('uploadModal').style.display = 'none';
  document.getElementById('closeVideoModal').onclick = () => document.getElementById('videoModal').style.display = 'none';
  document.getElementById('signInBtn').onclick = async () => {
    try { await signInWithEmailAndPassword(auth, document.getElementById('authEmail').value, document.getElementById('authPassword').value); document.getElementById('authModal').style.display = 'none'; } catch(e) { alert(e.message); }
  };
  document.getElementById('signUpBtn').onclick = async () => {
    try { const cred = await createUserWithEmailAndPassword(auth, document.getElementById('authEmail').value, document.getElementById('authPassword').value); await updateProfile(cred.user, { displayName: cred.user.email.split('@')[0] }); document.getElementById('authModal').style.display = 'none'; } catch(e) { alert(e.message); }
  };
  document.getElementById('publishVideoBtn').onclick = async () => {
    if (!currentUser) { alert("Login required"); return; }
    const title = document.getElementById('videoTitle').value.trim();
    const desc = document.getElementById('videoDesc').value.trim();
    const videoFile = document.getElementById('videoFile').files[0];
    const thumbFile = document.getElementById('thumbFile').files[0];
    if (!title || !videoFile) { alert("Title and video required"); return; }
    await uploadVideo(videoFile, thumbFile, title, desc);
    document.getElementById('uploadModal').style.display = 'none';
    document.getElementById('videoTitle').value = '';
    document.getElementById('videoDesc').value = '';
    document.getElementById('videoFile').value = '';
    document.getElementById('thumbFile').value = '';
    loadVideos();
  };
  
  // Initial render
  renderCollections();
  loadVideos();
</script>
</body>
</html>
